name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────────────────
  # macOS DMG
  # ──────────────────────────────────────────────────────────
  build-mac:
    name: macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller pillow

      - name: Build icon (.icns)
        run: |
          ICONSET="icon_plus.iconset"
          mkdir -p "$ICONSET"
          for SIZE in 16 32 64 128 256 512; do
            sips -z $SIZE $SIZE SAARJ_template_icon.png --out "$ICONSET/icon_${SIZE}x${SIZE}.png" > /dev/null 2>&1
            DOUBLE=$((SIZE * 2))
            sips -z $DOUBLE $DOUBLE SAARJ_template_icon.png --out "$ICONSET/icon_${SIZE}x${SIZE}@2x.png" > /dev/null 2>&1
          done
          iconutil -c icns "$ICONSET" -o icon_plus.icns
          rm -rf "$ICONSET"

      - name: Build .app with PyInstaller
        run: pyinstaller SAARJ_template.spec --noconfirm

      - name: Create DMG
        run: |
          mkdir -p dist/dmg_staging
          cp -R "dist/SAARJ Template.app" dist/dmg_staging/
          ln -s /Applications dist/dmg_staging/Applications
          hdiutil create \
            -volname "SAARJ Template 1.0" \
            -srcfolder dist/dmg_staging \
            -ov -format UDZO \
            -imagekey zlib-level=9 \
            "dist/SAARJ_template_Installer.dmg"
          rm -rf dist/dmg_staging

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: SAARJ_template-macOS
          path: dist/SAARJ_template_Installer.dmg

  # ──────────────────────────────────────────────────────────
  # Windows EXE
  # ──────────────────────────────────────────────────────────
  build-windows:
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller pillow

      - name: Build .ico (Windows icon)
        shell: python
        run: |
          from PIL import Image
          import os
          sizes = [(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)]
          img = Image.open('SAARJ_template_icon.png').convert('RGBA')
          frames = [img.resize(s, Image.LANCZOS) for s in sizes]
          frames[0].save('icon_plus.ico', format='ICO', sizes=sizes,
                         append_images=frames[1:])
          print('icon_plus.ico created')

      - name: Build EXE with PyInstaller
        run: pyinstaller SAARJ_template_windows.spec --noconfirm

      - name: Build installer with Inno Setup
        run: |
          choco install innosetup --no-progress -y
          iscc SAARJ_template_setup.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SAARJ_template-Windows
          path: dist/SAARJ_template_Setup.exe

  # ──────────────────────────────────────────────────────────
  # GitHub Release (only on tags)
  # ──────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: SAARJ_template-macOS
          path: release/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: SAARJ_template-Windows
          path: release/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: "SAARJ Template ${{ github.ref_name }}"
          body: |
            ## SAARJ Template ${{ github.ref_name }}

            Akademik dergi makalelerini kolayca LaTeX formatına dönüştüren masaüstü uygulaması.
            MIT Lisansı ile açık kaynak olarak yayınlanmıştır.

            ### ⬇️ İndirme ve Kurulum

            | Platform | Dosya | Açıklama |
            |---|---|---|
            | macOS | `SAARJ_template_Installer.dmg` | Open the DMG and drag the app into Applications |
            | Windows | `SAARJ_template_Setup.exe` | Run the installer wizard |

            ### macOS — İlk Açılışta Güvenlik Uyarısı
            Uygulama imzalanmamış olduğu için macOS uyarı verebilir.
            Çözüm: Uygulamaya **sağ tıklayın → Aç → Aç** seçin.
            Ya da: **Sistem Ayarları → Gizlilik ve Güvenlik → Yine de Aç**

            ### Gereksinimler
            - Python veya başka bir yazılım kurmanıza gerek yoktur.
            - Overleaf üzerinde derleme için ücretsiz [Overleaf hesabı](https://overleaf.com) yeterlidir.
            - Derleyici olarak **XeLaTeX** seçilmelidir.
          files: |
            release/SAARJ_template_Installer.dmg
            release/SAARJ_template_Setup.exe
          draft: false
          prerelease: false



